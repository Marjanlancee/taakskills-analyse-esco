<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Functieprofiel Decompositor</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f2eb;--surface:#fffef9;--border:#d8d2c4;--border-s:#a89f8c;--text:#1a1714;--muted:#7a7060}
body{background:var(--bg);color:var(--text);font-family:'Geist Mono','Courier New',monospace}
.header{border-bottom:1px solid var(--border);padding:20px 40px 18px;display:flex;align-items:center;gap:20px;background:var(--surface)}
.header-logo{height:36px;object-fit:contain}
.header-titles{flex:1}
.eyebrow{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.site-title{font-family:'Instrument Serif',Georgia,serif;font-size:24px;line-height:1;font-style:italic}
.site-title span{font-style:normal}
.header-r{font-size:9px;color:var(--muted);text-align:right;line-height:1.8;letter-spacing:.1em}
.main{display:flex;min-height:calc(100vh - 78px)}
.sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--border);padding:20px 16px;background:var(--surface);display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.slabel{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
input.field{font-family:'Geist Mono',monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text);outline:none;padding:8px 10px;border-radius:2px;width:100%;transition:border-color .2s}
input.field:focus{border-color:var(--border-s)}
textarea{font-family:'Geist Mono',monospace;font-size:12px;line-height:1.65;background:var(--bg);border:1px solid var(--border);color:var(--text);resize:none;outline:none;padding:10px 12px;border-radius:2px;width:100%;min-height:200px;transition:border-color .2s}
textarea:focus{border-color:var(--border-s)}
textarea::placeholder{color:var(--border-s)}
.btn-main{width:100%;padding:10px;background:var(--text);color:var(--bg);border:none;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s}
.btn-main:hover:not(:disabled){opacity:.82}
.btn-main:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px;cursor:pointer;border-radius:2px;width:100%;transition:all .15s}
.btn-ghost:hover{border-color:var(--border-s);color:var(--text)}
.spin{width:12px;height:12px;border:1.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.err{border:1px solid #e07070;background:#fce4e4;color:#9b2226;padding:10px 12px;font-size:11px;line-height:1.5;border-radius:2px;word-break:break-word}
.legend{border-top:1px solid var(--border);padding-top:12px;margin-top:auto}
.li{display:flex;align-items:flex-start;gap:7px;font-size:10px;margin-bottom:6px}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.empty-g{font-family:'Instrument Serif',serif;font-style:italic;font-size:56px;color:var(--border);line-height:1}
.empty-t{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);opacity:.6}
.ls{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ls-t{font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;color:var(--muted)}
.lb{width:140px;height:1px;background:var(--border);position:relative;overflow:hidden}
.lb::after{content:'';position:absolute;left:-60%;width:60%;height:100%;background:var(--text);animation:slide 1.1s ease-in-out infinite}
@keyframes slide{0%{left:-60%}100%{left:160%}}
.rh{border-bottom:1px solid var(--border);padding:18px 24px;background:var(--surface)}
.rt{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;margin-bottom:3px}
.rs{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.rm{display:flex;gap:14px;font-size:10px;color:var(--muted);flex-wrap:wrap;align-items:center}
.rm strong{color:var(--text)}
.rv{font-size:9px;color:var(--muted);margin-top:4px}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.tab{padding:11px 18px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tc{flex:1;overflow-y:auto;padding:20px 24px}
.tk{border:1px solid var(--border);background:var(--surface);border-radius:2px;margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.tk:hover{border-color:var(--border-s)}
.tk.open{border-color:var(--text)}
.tkh{display:flex;align-items:flex-start;gap:12px;padding:11px 13px;cursor:pointer;user-select:none}
.tnum{font-size:9px;color:var(--muted);flex-shrink:0;width:20px;margin-top:1px}
.tbody{flex:1;min-width:0}
.tname{font-size:12px;line-height:1.5;margin-bottom:5px}
.tmeta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.tbadge{font-size:9px;padding:1px 6px;border-radius:2px;border:1px solid}
.tchev{font-size:8px;color:var(--muted);flex-shrink:0;margin-top:2px}
.tex{border-top:1px solid var(--border);padding:12px 13px 14px 45px;background:var(--bg);display:flex;flex-direction:column;gap:12px}
.secl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:2px;font-size:10px;border:1px solid}
.pd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.esco-badge{background:#e8f0fe;color:#1a56db;border:1px solid #93b4fd;padding:1px 5px;border-radius:2px;font-size:8px;margin-left:4px;font-weight:500}
.eigen-badge{background:#f3e8ff;color:#6b21a8;border:1px solid #c084fc;padding:1px 5px;border-radius:2px;font-size:8px;margin-left:4px}
.no-esco{background:#f5f5f5;color:#999;border:1px solid #ddd;padding:1px 5px;border-radius:2px;font-size:8px;margin-left:4px}
.ci{display:flex;gap:8px;margin-bottom:5px}
.cb{color:#c4860a;flex-shrink:0;font-size:9px;margin-top:1px}
.cn{font-size:11px;font-weight:500}
.cd{font-size:10px;color:var(--muted);margin-top:1px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.sb{display:flex;align-items:flex-start;gap:7px;padding:8px 10px;border-radius:2px;border:1px solid;font-size:11px}
.sn{flex:1}
.se{font-size:8px;opacity:.65;margin-top:1px}
.snv{font-size:8px;letter-spacing:.06em;text-transform:uppercase;opacity:.6;flex-shrink:0;margin-top:1px}
.kc{border:1px solid var(--border);background:var(--surface);padding:12px 14px;display:flex;gap:12px;border-radius:2px;margin-bottom:7px}
.kn{font-size:9px;color:var(--muted);width:20px;flex-shrink:0}
.km{font-family:'Instrument Serif',serif;font-style:italic;font-size:16px;margin-bottom:3px}
.kd{font-size:11px;color:var(--muted);line-height:1.6}
.fi{animation:fi .3s ease forwards}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.changed-badge{background:#fef3d0;color:#7a5c00;border:1px solid #e8c96a;padding:1px 6px;border-radius:2px;font-size:9px}
.eigen-sm{background:#f3e8ff;color:#6b21a8;border:1px solid #c084fc;padding:1px 5px;border-radius:2px;font-size:9px}
.sk-card{border:1px solid var(--border);background:var(--surface);border-radius:2px;padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.sk-top{display:flex;align-items:center;gap:7px}
.sk-name{font-size:11px;flex:1}
.sk-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:2px;font-size:10px;border:1px solid;flex-shrink:0}
.sl-wrap{display:flex;flex-direction:column;gap:2px}
.sl-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--muted)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:2px;outline:none;cursor:pointer;background:var(--border)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--surface)}
.was{font-size:8px;color:var(--muted);margin-left:3px;opacity:.7}
.toggle-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:1px solid var(--border);color:var(--text);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px 10px;cursor:pointer;border-radius:2px;transition:all .15s}
.toggle-btn.open{border-color:#c084fc;color:#6b21a8;background:#fdf9ff;border-radius:2px 2px 0 0}
.eigen-panel{border:1px solid #c084fc;border-top:none;padding:10px;background:#fdf9ff;display:flex;flex-direction:column;gap:10px;border-radius:0 0 2px 2px}
.tip{background:#fef3d0;border:1px solid #e8c96a;border-radius:2px;padding:8px 10px;font-size:9px;color:#7a5c00;line-height:1.7}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const NIVEAUS = ["Basis","Gevorderd","Expert"];
const NIVEAU = {
  Basis:     {k:"#d8f3dc",t:"#2d6a4f",b:"#74c69d",d:"#2d6a4f",desc:"Uitvoerend, onder begeleiding"},
  Gevorderd: {k:"#fef3d0",t:"#7a5c00",b:"#e8c96a",d:"#c4860a",desc:"Zelfstandig, complexe situaties"},
  Expert:    {k:"#fce4e4",t:"#9b2226",b:"#e07070",d:"#9b2226",desc:"Strategisch, begeleidt anderen"},
};
const niveauOrder = {Expert:0,Gevorderd:1,Basis:2};

function App() {
  const [bedrijf, setBedrijf] = useState("");
  const [eigenTaal, setEigenTaal] = useState("");
  const [eigenOpen, setEigenOpen] = useState(false);
  const [input, setInput] = useState("");
  const [result, setResult] = useState(null);
  const [overrides, setOverrides] = useState({});
  const [selected, setSelected] = useState({});
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [tab, setTab] = useState("taken");
  const [openTask, setOpenTask] = useState(null);
  const [escoData, setEscoData] = useState(null);
  const [escoLoaded, setEscoLoaded] = useState(false);

  // Load ESCO database
  useEffect(() => {
    fetch('/esco_skills.json')
      .then(r => r.json())
      .then(data => { setEscoData(data); setEscoLoaded(true); })
      .catch(() => setEscoLoaded(false));
  }, []);

  const heeftEigen = eigenTaal.trim().length > 0;
  const changedCount = Object.keys(overrides).length;
  const getNiveau = (tid, skill, orig) => overrides[`${tid}-${skill}`] || orig;
  const setNiveau = (tid, skill, n) => setOverrides(p => ({...p, [`${tid}-${skill}`]: n}));
  const toggleSel = (k) => setSelected(p => ({...p, [k]: !p[k]}));

  const allSkills = result
    ? [...new Map(result.taken.flatMap(t => t.taak_skills.map(s => ({
        ...s, niveau: getNiveau(t.id, s.skill, s.niveau)
      }))).map(s => [s.skill, s])).values()]
    : [];

  const hardSkills = result
    ? [...new Map(result.taken.flatMap(t => t.taak_skills.map(s => ({
        ...s, niveau: getNiveau(t.id, s.skill, s.niveau)
      }))).map(s => [s.skill, s])).values()]
    : [];

  const softSkills = result
    ? [...new Map(result.taken.flatMap(t => t.generieke_competenties.map(c => ({
        skill: c.competentie, eigen: c.eigen || false
      }))).map(s => [s.skill, s])).values()]
    : [];

  const selHard = hardSkills.filter(s => selected[`hard-${s.skill}`]);
  const selSoft = softSkills.filter(s => selected[`soft-${s.skill}`]);
  const total = selHard.length + selSoft.length;

  const analyse = async () => {
    if (!input.trim()) return;
    setLoading(true); setError(null); setResult(null);
    setOverrides({}); setSelected({}); setOpenTask(null);
    try {
      const res = await fetch('/api/analyse', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          functieprofiel: input,
          bedrijf,
          eigenTaal,
          escoData: escoData || []
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setResult(data);
      setTab("taken");
    } catch(e) {
      setError(e.message || "Analyse mislukt");
    } finally {
      setLoading(false);
    }
  };

  const exportPDF = () => {
    const w = window.open("", "_blank");
    const hl = selHard.map(s => `<tr><td>${s.skill}</td><td>${s.esco_matched ? s.esco_code || 'ESCO' : '—'}</td><td>${s.niveau}</td></tr>`).join("");
    const sl = selSoft.map(s => `<tr><td>${s.skill}</td><td>${s.eigen ? 'Eigen' : '—'}</td><td>—</td></tr>`).join("");
    w.document.write(`<!DOCTYPE html><html><head><title>Skillset — ${result.functietitel}</title>
    <style>body{font-family:Georgia,serif;max-width:700px;margin:40px auto;font-size:13px}h1{font-size:22px;font-style:italic}h2{font-size:12px;text-transform:uppercase;letter-spacing:.1em;margin:20px 0 8px;color:#7a7060}table{width:100%;border-collapse:collapse}th{text-align:left;font-size:10px;text-transform:uppercase;color:#7a7060;padding:5px 8px;border-bottom:2px solid #d8d2c4}td{padding:7px 8px;border-bottom:1px solid #f0ede6;font-size:12px}.footer{margin-top:30px;font-size:10px;color:#a89f8c;border-top:1px solid #d8d2c4;padding-top:10px}</style>
    </head><body>
    <h1>${result.functietitel}</h1>
    <p style="color:#7a7060;font-size:11px;margin-bottom:20px">${bedrijf ? bedrijf + ' · ' : ''}${selHard.length} hardskills · ${selSoft.length} softskills</p>
    <h2>Hardskills (${selHard.length})</h2>
    <table><thead><tr><th>Skill</th><th>ESCO Code</th><th>Niveau</th></tr></thead><tbody>${hl}</tbody></table>
    <h2>Softskills / Competenties (${selSoft.length})</h2>
    <table><thead><tr><th>Competentie</th><th>Bron</th><th></th></tr></thead><tbody>${sl}</tbody></table>
    <div class="footer">Gegenereerd met Functieprofiel Decompositor · ESCO-aligned · Bright Work Solutions</div>
    <script>window.onload=()=>{window.print()}<\/script></body></html>`);
    w.document.close();
  };

  const D = NIVEAU;

  return <>
    <div className="header">
      <img src="/logo.png" alt="Bright Work Solutions" className="header-logo" />
      <div className="header-titles">
        <div className="eyebrow">ESCO-aligned · Skills Analyse Tool</div>
        <div className="site-title"><span>Functie</span>profiel <em>Decompositor</em></div>
      </div>
      <div className="header-r">
        {result && bedrijf
          ? <><div style={{fontSize:9,color:"var(--muted)"}}>Analyse voor</div><div style={{fontFamily:"'Instrument Serif',serif",fontStyle:"italic",fontSize:13}}>{bedrijf}</div></>
          : <>Skills · Taken<br/>Competenties</>
        }
        {escoLoaded && <div style={{fontSize:8,color:"#2d6a4f",marginTop:3}}>✓ ESCO geladen</div>}
      </div>
    </div>

    <div className="main">
      <aside className="sidebar">
        <div>
          <button className={`toggle-btn ${eigenOpen ? "open" : ""}`} onClick={() => setEigenOpen(o => !o)}>
            <span>Eigen competentietaal</span>
            <span>{eigenOpen ? "▲" : "▼"}{heeftEigen && <span className="eigen-sm" style={{marginLeft:6}}>Actief</span>}</span>
          </button>
          {eigenOpen && <div className="eigen-panel">
            <div>
              <label className="slabel" style={{color:"#6b21a8"}}>Bedrijfsnaam</label>
              <input className="field" value={bedrijf} onChange={e => setBedrijf(e.target.value)} placeholder="bijv. Acme B.V." />
            </div>
            <div>
              <label className="slabel" style={{color:"#6b21a8"}}>Eigen termen & competenties</label>
              <textarea rows={4} value={eigenTaal} onChange={e => setEigenTaal(e.target.value)}
                placeholder={"bijv. Continu verbeteren,\nVeilig werken,\nKlantpartnerschap"}
                style={{minHeight:"auto",fontSize:11}} />
              <div style={{fontSize:9,color:"#6b21a8",marginTop:3,lineHeight:1.5}}>
                Komma- of regelgescheiden. Worden gemarkeerd met <span className="eigen-badge" style={{marginLeft:0}}>Eigen</span>
              </div>
            </div>
          </div>}
        </div>

        <div>
          <label className="slabel">Functieprofiel invoer</label>
          <textarea rows={9} value={input} onChange={e => setInput(e.target.value)}
            placeholder={"Plak hier een functieprofiel,\nvacaturetekst of\ntaakomschrijving..."} />
        </div>

        <button className="btn-main" onClick={analyse} disabled={loading || !input.trim()}>
          {loading ? <><span className="spin" />Analyseren...</> : "Analyseer Functie →"}
        </button>

        {result && <>
          <button className="btn-ghost" onClick={() => { setResult(null); setInput(""); setOverrides({}); setSelected({}); }}>
            ↺ Nieuw profiel
          </button>
          {changedCount > 0 && <button className="btn-ghost" onClick={() => setOverrides({})}>↺ Niveaus resetten ({changedCount})</button>}
          <div className="tip">
            <strong>Zo werkt de tool</strong><br/>
            1. Ga naar <strong>Taken & Skills</strong><br/>
            2. Klik een taak open<br/>
            3. Sleep de slider om het niveau aan te passen<br/>
            4. Stel de definitieve skillset samen in het laatste tabblad
          </div>
        </>}

        {error && <div className="err">⚠ {error}</div>}

        <div className="legend">
          <label className="slabel">Niveaulegenda</label>
          {Object.entries(D).map(([l, d]) => (
            <div key={l} className="li">
              <div className="ld" style={{background: d.d}} />
              <div>
                <div style={{color: d.t, fontWeight: 500}}>{l}</div>
                <div style={{fontSize: 9, color: "var(--muted)", marginTop: 1}}>{d.desc}</div>
              </div>
            </div>
          ))}
          {heeftEigen && <div className="li" style={{marginTop:4}}>
            <div className="ld" style={{background:"#c084fc"}} />
            <div><div style={{color:"#6b21a8",fontWeight:500}}>Eigen</div><div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>Uit eigen competentietaal</div></div>
          </div>}
        </div>
      </aside>

      <main className="content">
        {loading && <div className="ls">
          <div className="ls-t">Profiel wordt geanalyseerd…</div>
          <div className="lb" />
          <div style={{fontSize:9,color:"var(--muted)",letterSpacing:"0.12em",textTransform:"uppercase"}}>Even geduld</div>
        </div>}

        {!loading && !result && <div className="empty">
          <div className="empty-g">Σ</div>
          <div className="empty-t">Plak een functieprofiel om te beginnen</div>
          {heeftEigen && <div style={{fontSize:9,color:"#6b21a8",background:"#f3e8ff",border:"1px solid #c084fc",padding:"4px 10px",borderRadius:2,marginTop:4}}>
            Eigen competentietaal van <strong>{bedrijf || "dit bedrijf"}</strong> is actief
          </div>}
        </div>}

        {!loading && result && <div className="fi" style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
          <div className="rh">
            <div className="rt">{result.functietitel}</div>
            <div className="rs">{result.samenvatting}</div>
            <div className="rm">
              <span><strong>{result.taken.length}</strong>&nbsp;taken</span>
              <span><strong>{allSkills.length}</strong>&nbsp;skills</span>
              <span><strong>{result.kerncompetenties.length}</strong>&nbsp;kerncompetenties</span>
              {changedCount > 0 && <span className="changed-badge">✎ {changedCount} aangepast</span>}
              {heeftEigen && <span className="eigen-sm">Eigen taal actief</span>}
            </div>
            {result.vergelijkbare_titels?.length > 0 && (
              <div className="rv">Ook bekend als: {result.vergelijkbare_titels.join(" · ")}</div>
            )}
          </div>

          <div className="tabs">
            {[["taken","Taken & Skills"],["skills","Skills Overzicht"],["kern","Kerncompetenties"],["definitief","Definitieve Skillset"]].map(([k,l]) => (
              <button key={k} className={`tab ${tab===k?"active":""}`} onClick={() => setTab(k)}>{l}</button>
            ))}
          </div>

          <div className="tc">
            {/* TAB: TAKEN */}
            {tab === "taken" && <div className="fi">
              {result.taken.map((t, i) => {
                const open = openTask === i;
                return <div key={t.id} className={`tk ${open?"open":""}`}>
                  <div className="tkh" onClick={() => setOpenTask(open ? null : i)}>
                    <div className="tnum">{String(t.id).padStart(2,"0")}</div>
                    <div className="tbody">
                      <div className="tname">{t.taak}</div>
                      <div className="tmeta">
                        {t.bron && <span className="tbadge" style={{background:"#e8f0fe",color:"#1a56db",borderColor:"#93b4fd"}}>{t.bron}</span>}
                        {t.frequentie && <span className="tbadge" style={{background:"var(--bg)",color:"var(--muted)",borderColor:"var(--border)"}}>{t.frequentie}</span>}
                        {t.belang && <span className="tbadge" style={{
                          background:t.belang==="hoog"?"#fce4e4":t.belang==="middel"?"#fef3d0":"#d8f3dc",
                          color:t.belang==="hoog"?"#9b2226":t.belang==="middel"?"#7a5c00":"#2d6a4f",
                          borderColor:t.belang==="hoog"?"#e07070":t.belang==="middel"?"#e8c96a":"#74c69d"
                        }}>belang: {t.belang}</span>}
                      </div>
                      {!open && <div className="pills">
                        {t.taak_skills.slice(0,3).map(s => {
                          const n = getNiveau(t.id, s.skill, s.niveau);
                          const d = D[n];
                          return <span key={s.skill} className="pill" style={{background:s.eigen?"#f3e8ff":d.k,color:s.eigen?"#6b21a8":d.t,borderColor:s.eigen?"#c084fc":d.b}}>
                            <span className="pd" style={{background:s.eigen?"#c084fc":d.d}}/>{s.skill}
                          </span>;
                        })}
                        {t.taak_skills.length > 3 && <span className="pill" style={{borderColor:"var(--border)",color:"var(--muted)"}}>+{t.taak_skills.length-3}</span>}
                      </div>}
                    </div>
                    <div className="tchev">{open?"▲":"▼"}</div>
                  </div>
                  {open && <div className="tex">
                    <div>
                      <div className="secl">Taak-specifieke skills</div>
                      <div style={{fontSize:9,color:"var(--muted)",marginBottom:8}}>Sleep de slider om het niveau aan te passen.</div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {t.taak_skills.map(s => {
                          const cur = getNiveau(t.id, s.skill, s.niveau);
                          const d = D[cur];
                          const val = NIVEAUS.indexOf(cur);
                          const changed = cur !== s.niveau;
                          return <div key={s.skill} className="sk-card" style={{borderColor:s.eigen?"#c084fc":"var(--border)"}}>
                            <div className="sk-top">
                              <span className="pd" style={{background:s.eigen?"#c084fc":d.d,width:6,height:6}}/>
                              <div className="sk-name">
                                {s.skill}
                                {s.eigen && <span className="eigen-badge">Eigen</span>}
                                {!s.eigen && s.esco_matched && s.esco_code && <span className="esco-badge">ESCO {s.esco_code}</span>}
                                {!s.eigen && !s.esco_matched && <span className="no-esco">geen ESCO match</span>}
                                {changed && <span className="was">(was: {s.niveau})</span>}
                                {s.toelichting && <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>{s.toelichting}</div>}
                              </div>
                              <span className="sk-badge" style={{background:d.k,color:d.t,borderColor:d.b}}>{cur}</span>
                            </div>
                            <div className="sl-wrap">
                              <input type="range" min={0} max={2} step={1} value={val}
                                style={{background:`linear-gradient(to right,${s.eigen?"#c084fc":d.d} 0%,${s.eigen?"#c084fc":d.d} ${val*50}%,var(--border) ${val*50}%,var(--border) 100%)`}}
                                onChange={e => setNiveau(t.id, s.skill, NIVEAUS[parseInt(e.target.value)])}/>
                              <div className="sl-labels"><span>Basis</span><span>Gevorderd</span><span>Expert</span></div>
                            </div>
                          </div>;
                        })}
                      </div>
                    </div>
                    <div>
                      <div className="secl">Generieke competenties</div>
                      {t.generieke_competenties.map(c => (
                        <div key={c.competentie} className="ci">
                          <span className="cb">◆</span>
                          <div>
                            <div className="cn">{c.competentie}{c.eigen && <span className="eigen-badge">Eigen</span>}</div>
                            <div className="cd">{c.toelichting}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>}
                </div>;
              })}
            </div>}

            {/* TAB: SKILLS */}
            {tab === "skills" && <div className="fi">
              {heeftEigen && (() => {
                const es = allSkills.filter(s => s.eigen);
                const esco = allSkills.filter(s => !s.eigen).sort((a,b) => niveauOrder[a.niveau]-niveauOrder[b.niveau]);
                return <>
                  {es.length > 0 && <div style={{marginBottom:18}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                      <span className="eigen-sm">Eigen</span>
                      <span style={{fontSize:10,color:"var(--muted)"}}>Competentietaal van <strong style={{color:"var(--text)"}}>{bedrijf||"dit bedrijf"}</strong></span>
                    </div>
                    <div className="sg">{es.map(s => <div key={s.skill} className="sb" style={{background:"#f3e8ff",color:"#6b21a8",borderColor:"#c084fc"}}>
                      <span className="pd" style={{background:"#c084fc"}}/><div className="sn">{s.skill}</div><span className="snv">{s.niveau}</span>
                    </div>)}</div>
                  </div>}
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                      <span className="esco-badge" style={{marginLeft:0}}>ESCO</span>
                      <span style={{fontSize:10,color:"var(--muted)"}}>Gestandaardiseerde ESCO-skills</span>
                    </div>
                    <div className="sg">{esco.map(s => { const d=D[s.niveau]; return <div key={s.skill} className="sb" style={{background:d.k,color:d.t,borderColor:d.b}}>
                      <span className="pd" style={{background:d.d}}/>
                      <div className="sn">{s.skill}{s.esco_code && <div className="se">ESCO: {s.esco_code}</div>}</div>
                      <span className="snv">{s.niveau}</span>
                    </div>; })}</div>
                  </div>
                </>;
              })()}
              {!heeftEigen && <>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,fontSize:10,color:"var(--muted)"}}>
                  <span className="esco-badge" style={{marginLeft:0}}>ESCO</span> ESCO-skills met code
                </div>
                <div className="sg">{allSkills.sort((a,b)=>niveauOrder[a.niveau]-niveauOrder[b.niveau]).map(s => {
                  const d=D[s.niveau];
                  return <div key={s.skill} className="sb" style={{background:d.k,color:d.t,borderColor:d.b}}>
                    <span className="pd" style={{background:d.d}}/>
                    <div className="sn">{s.skill}{s.esco_code && <div className="se">ESCO: {s.esco_code}</div>}</div>
                    <span className="snv">{s.niveau}</span>
                  </div>;
                })}</div>
              </>}
            </div>}

            {/* TAB: KERN */}
            {tab === "kern" && <div className="fi">
              {result.kerncompetenties.map((k,i) => (
                <div key={k.competentie} className="kc" style={{borderColor:k.eigen?"#c084fc":"var(--border)"}}>
                  <div className="kn">{String(i+1).padStart(2,"0")}</div>
                  <div>
                    <div className="km">{k.competentie}{k.eigen && <span className="eigen-badge">Eigen</span>}</div>
                    <div className="kd">{k.definitie}</div>
                  </div>
                </div>
              ))}
            </div>}

            {/* TAB: DEFINITIEF */}
            {tab === "definitief" && <div className="fi">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div style={{display:"flex",gap:10,fontSize:11,flexWrap:"wrap"}}>
                  <span style={{background:selHard.length>10?"#fce4e4":selHard.length>=8?"#d8f3dc":"var(--bg)",border:"1px solid var(--border)",padding:"4px 10px",borderRadius:2,color:selHard.length>10?"#9b2226":selHard.length>=8?"#2d6a4f":"var(--muted)"}}>
                    Hardskills: <strong>{selHard.length}</strong> / 8–10
                  </span>
                  <span style={{background:selSoft.length>6?"#fce4e4":selSoft.length>=5?"#d8f3dc":"var(--bg)",border:"1px solid var(--border)",padding:"4px 10px",borderRadius:2,color:selSoft.length>6?"#9b2226":selSoft.length>=5?"#2d6a4f":"var(--muted)"}}>
                    Softskills: <strong>{selSoft.length}</strong> / 5–6
                  </span>
                  <span style={{background:total===15?"#d8f3dc":total>15?"#fce4e4":"var(--bg)",border:"1px solid var(--border)",padding:"4px 10px",borderRadius:2,fontWeight:600,color:total===15?"#2d6a4f":total>15?"#9b2226":"var(--muted)"}}>
                    Totaal: {total} / 15
                  </span>
                </div>
                {total > 0 && <button onClick={exportPDF} style={{padding:"8px 14px",background:"var(--text)",color:"var(--bg)",border:"none",fontFamily:"'Geist Mono',monospace",fontSize:10,letterSpacing:".1em",textTransform:"uppercase",cursor:"pointer",borderRadius:2}}>
                  ↓ Exporteer PDF
                </button>}
              </div>
              {total > 15 && <div style={{background:"#fce4e4",border:"1px solid #e07070",color:"#9b2226",padding:"8px 12px",borderRadius:2,fontSize:11,marginBottom:12}}>
                Je hebt meer dan 15 skills geselecteerd.
              </div>}
              <div style={{marginBottom:18}}>
                <div className="secl" style={{marginBottom:8}}>Hardskills — selecteer 8 tot 10</div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {hardSkills.map(s => {
                    const k = `hard-${s.skill}`; const sel = !!selected[k]; const d = D[s.niveau];
                    return <div key={k} onClick={() => toggleSel(k)} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",border:`1px solid ${sel?"var(--text)":"var(--border)"}`,borderRadius:2,background:sel?"var(--surface)":"var(--bg)",cursor:"pointer"}}>
                      <div style={{width:15,height:15,borderRadius:2,border:`1.5px solid ${sel?"var(--text)":"var(--border)"}`,background:sel?"var(--text)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {sel && <span style={{color:"var(--bg)",fontSize:10}}>✓</span>}
                      </div>
                      <span className="pd" style={{background:s.eigen?"#c084fc":d.d}}/>
                      <div style={{flex:1,fontSize:11}}>{s.skill}{s.eigen && <span className="eigen-badge">Eigen</span>}{s.esco_code && <span className="esco-badge">ESCO {s.esco_code}</span>}</div>
                      <span style={{fontSize:9,padding:"2px 7px",borderRadius:2,border:"1px solid",background:d.k,color:d.t,borderColor:d.b}}>{s.niveau}</span>
                    </div>;
                  })}
                </div>
              </div>
              <div>
                <div className="secl" style={{marginBottom:8}}>Softskills / Competenties — selecteer 5 tot 6</div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {softSkills.map(s => {
                    const k = `soft-${s.skill}`; const sel = !!selected[k];
                    return <div key={k} onClick={() => toggleSel(k)} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",border:`1px solid ${sel?"var(--text)":"var(--border)"}`,borderRadius:2,background:sel?"var(--surface)":"var(--bg)",cursor:"pointer"}}>
                      <div style={{width:15,height:15,borderRadius:2,border:`1.5px solid ${sel?"var(--text)":"var(--border)"}`,background:sel?"var(--text)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {sel && <span style={{color:"var(--bg)",fontSize:10}}>✓</span>}
                      </div>
                      <span style={{width:5,height:5,borderRadius:"50%",background:s.eigen?"#c084fc":"#c4860a",flexShrink:0}}/>
                      <div style={{flex:1,fontSize:11}}>{s.skill}{s.eigen && <span className="eigen-badge">Eigen</span>}</div>
                    </div>;
                  })}
                </div>
              </div>
            </div>}
          </div>
        </div>}
      </main>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// Pre-load ESCO data notification
fetch('/esco_skills.json')
  .then(r => r.ok ? r.json() : null)
  .then(data => { if(data) console.log('ESCO database geladen:', data.length, 'skills'); })
  .catch(() => {});
</script>
</body>
</html>
