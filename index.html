<html lang="nl">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f2eb;--surface:#fffef9;--border:#d8d2c4;--border-s:#a89f8c;--text:#1a1714;--muted:#7a7060}
body{background:var(--bg);color:var(--text);font-family:'Geist Mono','Courier New',monospace;font-size:13px}
.header{border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;background:var(--surface)}
.header-logo{height:34px;object-fit:contain}
.header-titles{flex:1}
.eyebrow{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.site-title{font-family:'Instrument Serif',Georgia,serif;font-size:22px;line-height:1;font-style:italic}
.site-title span{font-style:normal}
.header-bedrijf{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.main{display:flex;min-height:calc(100vh - 74px)}
.sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--border);padding:18px 14px;background:var(--surface);display:flex;flex-direction:column;gap:11px;overflow-y:auto}
.slabel{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
input.field{font-family:'Geist Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--border);color:var(--text);outline:none;padding:7px 10px;border-radius:2px;width:100%;transition:border-color .2s}
input.field:focus{border-color:var(--border-s)}
textarea{font-family:'Geist Mono',monospace;font-size:11px;line-height:1.6;background:var(--bg);border:1px solid var(--border);color:var(--text);resize:none;outline:none;padding:9px 11px;border-radius:2px;width:100%;transition:border-color .2s}
textarea:focus{border-color:var(--border-s)}
textarea::placeholder{color:var(--border-s)}
.btn-main{width:100%;padding:10px;background:var(--text);color:var(--bg);border:none;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s}
.btn-main:hover:not(:disabled){opacity:.82}
.btn-main:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px;cursor:pointer;border-radius:2px;width:100%;transition:all .15s}
.btn-ghost:hover{border-color:var(--border-s);color:var(--text)}
.spin{width:12px;height:12px;border:1.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.err{border:1px solid #e07070;background:#fce4e4;color:#9b2226;padding:9px 11px;font-size:10px;line-height:1.5;border-radius:2px;word-break:break-word}
.legend{border-top:1px solid var(--border);padding-top:12px;margin-top:auto}
.li{display:flex;align-items:flex-start;gap:7px;font-size:10px;margin-bottom:6px}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.empty-g{font-family:'Instrument Serif',serif;font-style:italic;font-size:52px;color:var(--border);line-height:1}
.empty-t{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);opacity:.6}
.ls{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ls-t{font-family:'Instrument Serif',serif;font-style:italic;font-size:17px;color:var(--muted)}
.lb{width:140px;height:1px;background:var(--border);position:relative;overflow:hidden}
.lb::after{content:'';position:absolute;left:-60%;width:60%;height:100%;background:var(--text);animation:slide 1.1s ease-in-out infinite}
@keyframes slide{0%{left:-60%}100%{left:160%}}
.rh{border-bottom:1px solid var(--border);padding:16px 22px;background:var(--surface)}
.rt{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;margin-bottom:2px}
.rs{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:7px}
.rm{display:flex;gap:12px;font-size:10px;color:var(--muted);flex-wrap:wrap;align-items:center}
.rm strong{color:var(--text)}
.rv{font-size:9px;color:var(--muted);margin-top:3px}
.steps{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.step-btn{flex:1;padding:12px 8px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;margin-bottom:-1px;transition:all .15s;text-align:center}
.step-btn:hover{color:var(--text)}
.step-btn.active{color:var(--text);border-bottom-color:var(--text)}
.step-btn.done{color:#2d6a4f}
.step-btn:disabled{opacity:.4;cursor:not-allowed}
.tc{flex:1;overflow-y:auto;padding:18px 22px}
.taak-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:2px;margin-bottom:5px;background:var(--surface);cursor:pointer;transition:all .15s}
.taak-row:hover{border-color:var(--border-s)}
.taak-row.selected{border-color:#2d6a4f;background:#f0faf2}
.taak-check{width:16px;height:16px;border-radius:2px;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.taak-row.selected .taak-check{background:#2d6a4f;border-color:#2d6a4f}
.taak-body{flex:1;min-width:0}
.taak-naam{font-size:12px;line-height:1.4;margin-bottom:4px}
.taak-meta{display:flex;gap:5px;flex-wrap:wrap}
.tbadge{font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid}
.tk{border:1px solid var(--border);background:var(--surface);border-radius:2px;margin-bottom:6px;overflow:hidden}
.tk.open{border-color:var(--text)}
.tkh{display:flex;align-items:flex-start;gap:11px;padding:10px 12px;cursor:pointer;user-select:none}
.tnum{font-size:9px;color:var(--muted);flex-shrink:0;width:18px;margin-top:1px}
.tbody{flex:1;min-width:0}
.tname{font-size:12px;line-height:1.4;margin-bottom:4px}
.tchev{font-size:8px;color:var(--muted);flex-shrink:0;margin-top:2px}
.tex{border-top:1px solid var(--border);padding:11px 12px 13px 41px;background:var(--bg);display:flex;flex-direction:column;gap:11px}
.secl{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.pills{display:flex;flex-wrap:wrap;gap:4px}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:2px;font-size:10px;border:1px solid}
.pd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.esco-badge{background:#e8f0fe;color:#1a56db;border:1px solid #93b4fd;padding:1px 5px;border-radius:2px;font-size:8px;margin-left:3px;font-weight:500}
.eigen-badge{background:#f3e8ff;color:#6b21a8;border:1px solid #c084fc;padding:1px 5px;border-radius:2px;font-size:8px;margin-left:3px}
.no-match{background:#f5f5f5;color:#999;border:1px solid #ddd;padding:1px 5px;border-radius:2px;font-size:8px;margin-left:3px}
.sk-card{border:1px solid var(--border);background:var(--surface);border-radius:2px;padding:9px 11px;display:flex;flex-direction:column;gap:6px}
.sk-top{display:flex;align-items:center;gap:6px}
.sk-name{font-size:11px;flex:1}
.sk-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:2px;font-size:10px;border:1px solid;flex-shrink:0}
.sl-wrap{display:flex;flex-direction:column;gap:2px}
.sl-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--muted)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:2px;outline:none;cursor:pointer;background:var(--border)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--surface)}
.was{font-size:8px;color:var(--muted);margin-left:3px;opacity:.7}
.def-row{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--border);border-radius:2px;margin-bottom:5px;background:var(--surface);cursor:pointer}
.def-row.selected{border-color:var(--text);background:var(--bg)}
.def-check{width:15px;height:15px;border-radius:2px;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.def-row.selected .def-check{background:var(--text);border-color:var(--text)}
.fi{animation:fi .3s ease forwards}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.toggle-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:1px solid var(--border);color:var(--text);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px 10px;cursor:pointer;border-radius:2px;transition:all .15s}
.toggle-btn.open{border-color:#c084fc;color:#6b21a8;background:#fdf9ff;border-radius:2px 2px 0 0}
.eigen-panel{border:1px solid #c084fc;border-top:none;padding:10px;background:#fdf9ff;display:flex;flex-direction:column;gap:8px;border-radius:0 0 2px 2px}
.eigen-sm{background:#f3e8ff;color:#6b21a8;border:1px solid #c084fc;padding:1px 5px;border-radius:2px;font-size:9px}
.counter-box{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.counter{padding:5px 12px;border:1px solid var(--border);border-radius:2px;font-size:11px;background:var(--bg)}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// 5 niveaus: 1=Beginner, 2=Basis, 3=Gemiddeld, 4=Gevorderd, 5=Expert
const NIVEAUS = ["Beginner","Basis","Gemiddeld","Gevorderd","Expert"];
const NIVEAU = {
  Beginner: {k:"#f0f0f0",t:"#444444",b:"#bbbbbb",d:"#888888",desc:"Nog geen kennis/vaardigheid, in ontwikkeling"},
  Basis:    {k:"#d8f3dc",t:"#2d6a4f",b:"#74c69d",d:"#2d6a4f",desc:"Eenvoudige taken, met begeleiding"},
  Gemiddeld:{k:"#d0eaff",t:"#1a56db",b:"#93b4fd",d:"#1a56db",desc:"Meeste taken zelfstandig, soms ondersteuning"},
  Gevorderd:{k:"#fef3d0",t:"#7a5c00",b:"#e8c96a",d:"#c4860a",desc:"Complexe taken zelfstandig, geen begeleiding"},
  Expert:   {k:"#fce4e4",t:"#9b2226",b:"#e07070",d:"#9b2226",desc:"Zeer hoog niveau, begeleidt anderen, innoveert"},
};

function App() {
  const [bedrijf, setBedrijf] = useState("");
  const [eigenTaal, setEigenTaal] = useState("");
  const [eigenOpen, setEigenOpen] = useState(false);
  const [input, setInput] = useState("");
  const [stap, setStap] = useState(0);
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState("");
  const [error, setError] = useState(null);
  const [functietitel, setFunctietitel] = useState("");
  const [samenvatting, setSamenvatting] = useState("");
  const [vergelijkbareTitels, setVergelijkbareTitels] = useState([]);
  const [taken, setTaken] = useState([]);
  const [skillsData, setSkillsData] = useState(null);
  const [overrides, setOverrides] = useState({});
  const [openTask, setOpenTask] = useState(null);
  const [selectedDef, setSelectedDef] = useState({});
  const [bronnen, setBronnen] = useState("");
  const [bronnenOpen, setBronnenOpen] = useState(false);
  const [bronnenStatus, setBronnenStatus] = useState([]);
  const [pdfTekst, setPdfTekst] = useState("");
  const [pdfNaam, setPdfNaam] = useState("");
  const [uitgebreid, setUitgebreid] = useState(false);

  const heeftEigen = eigenTaal.trim().length > 0;
  const geselecteerdeTaken = taken.filter(t => t.geselecteerd);
  const getNiveau = (tid, skill, orig) => overrides[tid+'-'+skill] || orig || "Basis";
  const setNiveau = (tid, skill, n) => setOverrides(p => ({...p,[tid+'-'+skill]:n}));

  const leesUitPdf = (file) => {
    if (!file || !file.type.includes('pdf')) return;
    setPdfNaam(file.name);
    const reader = new FileReader();
    reader.onload = (e) => {
      const arr = new Uint8Array(e.target.result);
      let raw = '';
      for (let i = 0; i < arr.length; i++) raw += String.fromCharCode(arr[i]);
      const matches = raw.match(/[A-Za-z\xC0-\xFF\s\d.,;:!?()%-]{30,}/g) || [];
      const tekst = matches.join(' ').replace(/\s+/g, ' ').trim().slice(0, 8000);
      setPdfTekst(tekst);
    };
    reader.readAsArrayBuffer(file);
  };

  const analyseerTaken = async () => {
    if (!input.trim()) return;
    setLoading(true); setLoadingMsg("Functieprofiel analyseren en taken genereren..."); setError(null);
    try {
      const res = await fetch('/api/analyse', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ stap:1, functieprofiel:input, bedrijf, eigenTaal, bronnen: bronnen.trim() ? bronnen.split('\n').map(b=>b.trim()).filter(Boolean) : [], pdfTekst: pdfTekst||'' })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setFunctietitel(data.functietitel || "");
      setSamenvatting(data.samenvatting || "");
      setVergelijkbareTitels(data.vergelijkbare_titels || []);
      setTaken(data.taken || []);
      setBronnenStatus(data.bronnenStatus || []);
      setStap(1);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const koppelSkills = async () => {
    if (!geselecteerdeTaken.length) return;
    setLoading(true); setLoadingMsg("ESCO-skills koppelen aan taken..."); setError(null);
    try {
      const res = await fetch('/api/analyse', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ stap:2, functietitel, taken:geselecteerdeTaken, bedrijf, eigenTaal })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setSkillsData(data);
      setOverrides({});
      setOpenTask(null);
      setStap(2);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const toggleTaak = (id) => setTaken(prev => prev.map(t => t.id===id ? {...t,geselecteerd:!t.geselecteerd} : t));
  const eigenTermenLijst = eigenTaal.trim() ? eigenTaal.split(/[,\n]/).map(t=>t.trim()).filter(Boolean) : [];

  const alleHardskills = skillsData ? (() => {
    const map = new Map();
    (skillsData.taken||[]).flatMap(t=>(t.hardskills||[]).map(s=>({...s,niveau:getNiveau(t.id,s.skill,s.niveau),taakId:t.id}))).forEach(s=>{
      if (!map.has(s.skill)||(!map.get(s.skill).esco_code&&s.esco_code)) map.set(s.skill,s);
    });
    eigenTermenLijst.forEach(term => {
      if (!map.has(term)) map.set(term,{skill:term,niveau:"Basis",bron:"bedrijf",eigen:true,esco_code:null,esco_label:null,esco_matched:false});
    });
    return [...map.values()];
  })() : [];

  const alleSoftskills = skillsData ? (() => {
    const map = new Map();
    (skillsData.taken||[]).flatMap(t=>(t.softskills||[]).map(s=>({...s,niveau:getNiveau(t.id,'soft-'+s.softskill,s.niveau||"Basis")}))).forEach(s=>{
      if (!map.has(s.softskill)||(!map.get(s.softskill).esco_code&&s.esco_code)) map.set(s.softskill,s);
    });
    return [...map.values()];
  })() : [];

  const selHard = alleHardskills.filter(s=>selectedDef['h-'+s.skill]);
  const selSoft = alleSoftskills.filter(s=>selectedDef['s-'+s.softskill]);

  const exportWord = async () => {
    try {
      let tries = 0;
      while (typeof JSZip === 'undefined' && tries < 30) {
        await new Promise(r => setTimeout(r, 100));
        tries++;
      }
      if (typeof JSZip === 'undefined') { alert('Word export library niet geladen.'); return; }

      const datum = new Date().toLocaleDateString('nl-NL');
      const jaar = new Date().getFullYear();

      let uitgebreideOmschrijving = '';
      if (uitgebreid) {
        try {
          const bronLijst = bronnen.trim() ? bronnen.split('\n').filter(b=>b.trim()).join(', ') : '';
          const res = await fetch('/api/analyse', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ stap:3, functietitel, samenvatting, taken:geselecteerdeTaken, skills:{hard:selHard,soft:selSoft}, bedrijf, bronnenTekst:bronLijst }) });
          const data = await res.json();
          if (data.omschrijving) uitgebreideOmschrijving = data.omschrijving;
        } catch(e) { console.error('Omschrijving fout:', e); }
      }

      const skillsPerTaak = new Map();
      if (skillsData) (skillsData.taken||[]).forEach(t => skillsPerTaak.set(t.id, t));
      const geselecteerdeHardNames = new Set(selHard.map(s=>s.skill));
      const geselecteerdeSoftNames = new Set(selSoft.map(s=>s.softskill));
      const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

      const wordSkillMap = new Map();
      geselecteerdeTaken.forEach(taak => {
        const st = skillsPerTaak.get(taak.id);
        const hs = st ? (st.hardskills||[]).filter(s=>geselecteerdeHardNames.has(s.skill)) : [];
        const ss = st ? (st.softskills||[]).filter(s=>geselecteerdeSoftNames.has(s.softskill)) : [];
        hs.forEach(s => {
          const key = 'h-'+s.skill;
          if (!wordSkillMap.has(key)) wordSkillMap.set(key, {type:'Hard', naam:s.skill, code:s.esco_code||'', definitie:s.esco_definitie||'', taken:[]});
          wordSkillMap.get(key).taken.push({taak:taak.taak, niveau:getNiveau(taak.id,s.skill,s.niveau)});
        });
        ss.forEach(s => {
          const key = 's-'+s.softskill;
          if (!wordSkillMap.has(key)) wordSkillMap.set(key, {type:'Soft', naam:s.softskill, code:s.esco_code||'', definitie:s.esco_definitie||'', taken:[]});
          wordSkillMap.get(key).taken.push({taak:taak.taak, niveau:getNiveau(taak.id,'soft-'+s.softskill,s.niveau||'Basis')});
        });
      });

      const infoRijen = [
        ['Bedrijf', bedrijf||'—'],['Functietitel', functietitel],['Datum', datum],
        ['Skills-taxonomie','ESCO — European Skills, Competences, Qualifications and Occupations'],
        ['Aantal taken',String(geselecteerdeTaken.length)],['Hardskills',String(alleHardskills.length)],
        ['Softskills',String(alleSoftskills.length)],
        ['Geselecteerde skills',String(selHard.length+selSoft.length)+' ('+selHard.length+' hard, '+selSoft.length+' soft)'],
        ['Ook bekend als',vergelijkbareTitels.join(', ')||'—'],
      ].map((r,i) => '<w:tr><w:tc><w:tcPr><w:tcW w:w="2800" w:type="dxa"/><w:shd w:val="clear" w:color="auto" w:fill="'+(i%2===0?'E8EDF5':'F0F4FA')+'"/><w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar></w:tcPr><w:p><w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:b/><w:sz w:val="20"/><w:color w:val="1F3864"/></w:rPr><w:t>'+esc(r[0])+'</w:t></w:r></w:p></w:tc><w:tc><w:tcPr><w:tcW w:w="6800" w:type="dxa"/><w:shd w:val="clear" w:color="auto" w:fill="'+(i%2===0?'E8EDF5':'F0F4FA')+'"/><w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar></w:tcPr><w:p><w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="20"/></w:rPr><w:t xml:space="preserve">'+esc(r[1])+'</w:t></w:r></w:p></w:tc></w:tr>').join('');

      // Word: skill-centric tabel — Type | Skill + definitie | Taken per niveau
      let skillRijen = '<w:tr><w:trPr><w:trHeight w:val="400"/></w:trPr>'

      ['',''],
      ['BRONVERMELDING',''],
      ['ESCO database','https://esco.ec.europa.eu/nl'],
      ['O*NET Online (referentie)','https://www.onetonline.org'],
      ['ISCO-08 (referentie)','https://www.ilo.org/ilostat-files/ISCO/newdocs-08-2012/ISCO-08-EN.pdf'],
    ];
    const wsMeta = XLSX.utils.aoa_to_sheet(meta);
    wsMeta['!cols'] = [{wch:35},{wch:90}];
    XLSX.utils.book_append_sheet(wb, wsMeta, 'Methodiek');

    XLSX.writeFile(wb, 'Skillset_ESCO_'+(bedrijf?bedrijf.replace(/\s/g,'_')+'_':'')+functietitel.replace(/\s/g,'_')+'_'+datum.replace(/\//g,'-')+'.xlsx');
  };

  const D = NIVEAU;
  return (
    <div>
      <div className="header">
        <img src="/logo.png" alt="Bright Work Solutions" className="header-logo"/>
        <div className="header-titles">
          <div className="eyebrow">ESCO-aligned · Skills Analyse Tool</div>
          <div className="site-title"><span>Taakanalyse</span> Skills <em>ESCO</em></div>
        </div>
        <div className="header-bedrijf">
          <input className="field" value={bedrijf} onChange={e=>setBedrijf(e.target.value)} placeholder="Bedrijfsnaam" style={{width:180,fontSize:11}}/>
        </div>
      </div>

      <div className="main">
        <aside className="sidebar">
          <div>
            <button className={"toggle-btn "+(eigenOpen?"open":"")} onClick={()=>setEigenOpen(o=>!o)}>
              <span>Bedrijfsskills</span>
              <span>{eigenOpen?"▲":"▼"}{heeftEigen&&<span className="eigen-sm" style={{marginLeft:6}}>Actief</span>}</span>
            </button>
            {eigenOpen&&<div className="eigen-panel">
              <div>
                <label className="slabel" style={{color:"#6b21a8"}}>Bedrijfseigen termen & kernwaarden</label>
                <textarea rows={5} value={eigenTaal} onChange={e=>setEigenTaal(e.target.value)} placeholder={"bijv. Veiligheid eerst,\nKlantpartnerschap,\nZero defects"} style={{minHeight:"auto",fontSize:11}}/>
              </div>
            </div>}
          </div>

          <div>
            <button className={"toggle-btn "+(bronnenOpen?"open":"")} onClick={()=>setBronnenOpen(o=>!o)} style={bronnenOpen?{borderColor:"#0ea5e9",color:"#0369a1",background:"#f0f9ff",borderRadius:"2px 2px 0 0"}:{}}>
              <span>Aanvullende bronnen</span>
              <span>{bronnenOpen?"▲":"▼"}{bronnen.trim()&&<span style={{background:"#e0f2fe",color:"#0369a1",border:"1px solid #7dd3fc",padding:"1px 5px",borderRadius:2,fontSize:9,marginLeft:6}}>Actief</span>}</span>
            </button>
            {bronnenOpen&&<div style={{border:"1px solid #0ea5e9",borderTop:"none",padding:10,background:"#f0f9ff",display:"flex",flexDirection:"column",gap:8,borderRadius:"0 0 2px 2px"}}>
              <div>
                <label className="slabel" style={{color:"#0369a1"}}>URLs — één per regel</label>
                <textarea rows={5} value={bronnen} onChange={e=>setBronnen(e.target.value)} placeholder={"https://www.bedrijf.nl/over-ons"} style={{minHeight:"auto",fontSize:11}}/>
              </div>
              <div>
                <label className="slabel" style={{color:"#0369a1"}}>Of upload een PDF</label>
                <label style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",border:"1px dashed #7dd3fc",borderRadius:2,cursor:"pointer",background:"white",fontSize:10,color:"#0369a1"}}>
                  <span>📄</span><span>{pdfNaam||"Klik om PDF te selecteren"}</span>
                  <input type="file" accept=".pdf" style={{display:"none"}} onChange={e=>leesUitPdf(e.target.files[0])}/>
                </label>
                {pdfTekst&&<div style={{fontSize:9,color:"#2d6a4f",marginTop:4,padding:"4px 8px",background:"#f0faf2",borderRadius:2}}>✓ PDF gelezen — {pdfTekst.length} tekens</div>}
              </div>
            </div>}
          </div>

          <div>
            <label className="slabel">Functieprofiel invoer</label>
            <textarea rows={9} value={input} onChange={e=>setInput(e.target.value)} placeholder={"Plak hier een functieprofiel,\nvacaturetekst of\ntaakomschrijving..."}/>
          </div>

          {stap===0&&<button className="btn-main" onClick={analyseerTaken} disabled={loading||!input.trim()}>
            {loading?<><span className="spin"/>Analyseren...</>:"Stap 1: Genereer taken →"}
          </button>}

          {stap>=1&&<>
            <button className="btn-main" onClick={analyseerTaken} disabled={loading}>
              {loading&&loadingMsg.includes("taken")?<><span className="spin"/>Laden...</>:"↺ Heranalyseer taken"}
            </button>
            <button className="btn-main" onClick={koppelSkills} disabled={loading||geselecteerdeTaken.length===0} style={{background:"#2d6a4f"}}>
              {loading&&loadingMsg.includes("ESCO")?<><span className="spin"/>ESCO koppelen...</>:"Stap 2: Koppel ESCO skills ("+geselecteerdeTaken.length+") →"}
            </button>
            {stap>=2&&<button className="btn-main" onClick={()=>setStap(3)} style={{background:"#1a56db"}}>
              Stap 3: Definitieve skillset →
            </button>}
            <button className="btn-ghost" onClick={()=>{setStap(0);setTaken([]);setSkillsData(null);setOverrides({});setSelectedDef({});setPdfTekst('');setPdfNaam('');}}>
              ↺ Opnieuw beginnen
            </button>
          </>}

          {error&&<div className="err">⚠ {error}</div>}

          <div className="legend">
            <label className="slabel">Bronlegenda</label>
            <div className="li"><span>📄</span><div><div style={{fontWeight:500}}>Profiel</div><div style={{fontSize:9,color:"var(--muted)"}}>Uit vacature/functieprofiel</div></div></div>
            <div className="li"><span>🔧</span><div><div style={{fontWeight:500}}>Beroep</div><div style={{fontSize:9,color:"var(--muted)"}}>Uit beroeps-/sectorkennis</div></div></div>
            <div className="li"><span>🏢</span><div><div style={{fontWeight:500}}>Bedrijf</div><div style={{fontSize:9,color:"var(--muted)"}}>Jouw bedrijfsskills</div></div></div>
            <div className="li"><span>🔗</span><div><div style={{fontWeight:500}}>Bron</div><div style={{fontSize:9,color:"var(--muted)"}}>Uit aanvullende bronnen</div></div></div>
            <div style={{borderTop:"1px solid var(--border)",paddingTop:10,marginTop:6}}>
              <label className="slabel">Niveaulegenda (1–5)</label>
              {Object.entries(D).map(([l,d],i)=><div key={l} className="li">
                <div className="ld" style={{background:d.d}}/>
                <div><div style={{color:d.t,fontWeight:500}}>{i+1}. {l}</div><div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>{d.desc}</div></div>
              </div>)}
            </div>
          </div>
        </aside>

        <main className="content">
          {loading&&<div className="ls">
            <div className="ls-t">{loadingMsg||"Laden..."}</div>
            <div className="lb"/>
            <div style={{fontSize:9,color:"var(--muted)",letterSpacing:"0.12em",textTransform:"uppercase"}}>Even geduld</div>
          </div>}

          {!loading&&stap===0&&<div className="empty">
            <div className="empty-g">Σ</div>
            <div className="empty-t">Plak een functieprofiel om te beginnen</div>
            <div style={{fontSize:10,color:"var(--muted)",textAlign:"center",maxWidth:300,lineHeight:1.6,marginTop:8}}>
              Stap 1 → Taken genereren & valideren<br/>
              Stap 2 → ESCO-skills koppelen<br/>
              Stap 3 → Definitieve skillset exporteren
            </div>
          </div>}

          {!loading&&stap>=1&&stap!==2&&stap!==3&&<div className="fi" style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
            <div className="rh">
              <div className="rt">{functietitel}</div>
              <div className="rs">{samenvatting}</div>
              <div className="rm">
                <span><strong>{taken.length}</strong> taken totaal</span>
                <span><strong>{geselecteerdeTaken.length}</strong> geselecteerd</span>
              </div>
              {vergelijkbareTitels.length>0&&<div className="rv">Ook bekend als: {vergelijkbareTitels.join(" · ")}</div>}
            </div>
            <div style={{padding:"10px 22px",background:"var(--surface)",borderBottom:"1px solid var(--border)",fontSize:10,color:"var(--muted)"}}>
              Vink de taken aan die van toepassing zijn. Klik daarna op <strong>Stap 2</strong> om ESCO-skills te koppelen.
            </div>
            {bronnenStatus.length>0&&<div style={{padding:"8px 22px",background:"var(--surface)",borderBottom:"1px solid var(--border)",display:"flex",flexDirection:"column",gap:3}}>
              {bronnenStatus.map((b,i)=><div key={i} style={{fontSize:10,color:b.ok?"#2d6a4f":"#9b2226",display:"flex",gap:6,alignItems:"center"}}>
                <span>{b.ok?"✓":"⚠"}</span><span>{b.url}</span><span style={{opacity:.7}}>— {b.melding}</span>
              </div>)}
            </div>}
            <div className="tc"><div className="fi">
              {taken.map(t=><div key={t.id} className={"taak-row "+(t.geselecteerd?"selected":"")} onClick={()=>toggleTaak(t.id)}>
                <div className="taak-check">{t.geselecteerd&&<span style={{color:"white",fontSize:10}}>✓</span>}</div>
                <div className="taak-body">
                  <div className="taak-naam">{t.taak}</div>
                  <div className="taak-meta">
                    {t.bron&&<span className="tbadge" style={{background:t.bron==="profiel"?"#e8f0fe":t.bron==="beroep"?"#fef3d0":"#f3e8ff",color:t.bron==="profiel"?"#1a56db":t.bron==="beroep"?"#7a5c00":"#6b21a8",borderColor:t.bron==="profiel"?"#93b4fd":t.bron==="beroep"?"#e8c96a":"#c084fc"}}>{t.bron==="profiel"?"📄 profiel":t.bron==="beroep"?"🔧 beroep":t.bron==="bron"?"🔗 bron":"🏢 bedrijf"}</span>}
                    {t.frequentie&&<span className="tbadge" style={{background:"var(--bg)",color:"var(--muted)",borderColor:"var(--border)"}}>{t.frequentie}</span>}
                    {t.belang&&<span className="tbadge" style={{background:t.belang==="hoog"?"#fce4e4":t.belang==="middel"?"#fef3d0":"#d8f3dc",color:t.belang==="hoog"?"#9b2226":t.belang==="middel"?"#7a5c00":"#2d6a4f",borderColor:t.belang==="hoog"?"#e07070":t.belang==="middel"?"#e8c96a":"#74c69d"}}>belang: {t.belang}</span>}
                  </div>
                </div>
              </div>)}
            </div></div>
          </div>}

          {!loading&&stap===2&&skillsData&&<div className="fi" style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
            <div className="rh">
              <div className="rt">{functietitel}</div>
              <div className="rm">
                <span><strong>{geselecteerdeTaken.length}</strong> taken</span>
                <span><strong>{alleHardskills.length}</strong> hardskills</span>
                <span><strong>{alleSoftskills.length}</strong> softskills</span>
              </div>
            </div>
            <div className="steps">
              <button className="step-btn done" onClick={()=>setStap(1)}>◀ Taken aanpassen</button>
              <button className="step-btn active">Stap 2: Skills & niveaus</button>
              <button className="step-btn" onClick={()=>setStap(3)}>Stap 3: Definitieve set ▶</button>
            </div>
            <div className="tc">
              {(skillsData.taken||[]).map((t,i)=>{
                const taakInfo = geselecteerdeTaken.find(gt=>gt.id===t.id);
                const open = openTask===i;
                return <div key={t.id||i} className={"tk "+(open?"open":"")}>
                  <div className="tkh" onClick={()=>setOpenTask(open?null:i)}>
                    <div className="tnum">{String(i+1).padStart(2,"0")}</div>
                    <div className="tbody">
                      <div className="tname">{taakInfo?.taak||"Taak "+t.id}</div>
                      {!open&&<div className="pills">
                        {(t.hardskills||[]).slice(0,3).map(s=>{
                          const n=getNiveau(t.id,s.skill,s.niveau); const d=D[n]||D["Basis"];
                          return <span key={s.skill} className="pill" style={{background:s.eigen?"#f3e8ff":d.k,color:s.eigen?"#6b21a8":d.t,borderColor:s.eigen?"#c084fc":d.b}}>
                            <span className="pd" style={{background:s.eigen?"#c084fc":d.d}}/>{s.skill}
                          </span>;
                        })}
                      </div>}
                    </div>
                    <div className="tchev">{open?"▲":"▼"}</div>
                  </div>
                  {open&&<div className="tex">
                    <div>
                      <div className="secl">Hardskills</div>
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {(t.hardskills||[]).map(s=>{
                          const cur=getNiveau(t.id,s.skill,s.niveau); const d=D[cur]||D["Basis"]; const val=NIVEAUS.indexOf(cur); const changed=cur!==s.niveau;
                          return <div key={s.skill} className="sk-card" style={{borderColor:s.eigen?"#c084fc":"var(--border)"}}>
                            <div className="sk-top">
                              <span className="pd" style={{background:s.eigen?"#c084fc":d.d,width:6,height:6}}/>
                              <div className="sk-name">
                                {s.skill}
                                {s.eigen&&<span className="eigen-badge">Eigen</span>}
                                {!s.eigen&&s.esco_matched&&s.esco_code&&<span className="esco-badge" title={s.esco_uri||''}>{s.esco_code}</span>}
                                {!s.eigen&&!s.esco_matched&&<span className="no-match">geen ESCO match</span>}
                                {changed&&<span className="was">(was: {s.niveau})</span>}
                                {s.toelichting&&<div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>{s.toelichting}</div>}
                              </div>
                              <span className="sk-badge" style={{background:d.k,color:d.t,borderColor:d.b}}>{NIVEAUS.indexOf(cur)+1}. {cur}</span>
                            </div>
                            <div className="sl-wrap">
                              <input type="range" min={0} max={4} step={1} value={val<0?1:val}
                                style={{background:"linear-gradient(to right,"+(s.eigen?"#c084fc":d.d)+" 0%,"+(s.eigen?"#c084fc":d.d)+" "+(val*25)+"%, var(--border) "+(val*25)+"%, var(--border) 100%)"}}
                                onChange={e=>setNiveau(t.id,s.skill,NIVEAUS[parseInt(e.target.value)])}/>
                              <div className="sl-labels"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
                            </div>
                          </div>;
                        })}
                      </div>
                    </div>
                    <div>
                      <div className="secl">Softskills</div>
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {(t.softskills||[]).map(s=>{
                          const cur=getNiveau(t.id,'soft-'+s.softskill,s.niveau||"Basis"); const d=D[cur]||D["Basis"]; const val=NIVEAUS.indexOf(cur); const changed=cur!==(s.niveau||"Basis");
                          return <div key={s.softskill} className="sk-card">
                            <div className="sk-top">
                              <span className="pd" style={{background:"#c4860a",width:6,height:6}}/>
                              <div className="sk-name">
                                {s.softskill}
                                {s.esco_matched&&s.esco_code&&<span className="esco-badge">{s.esco_code}</span>}
                                {!s.esco_matched&&<span className="no-match">geen ESCO match</span>}
                                {changed&&<span className="was">(was: {s.niveau||"Basis"})</span>}
                                {s.toelichting&&<div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>{s.toelichting}</div>}
                              </div>
                              <span className="sk-badge" style={{background:d.k,color:d.t,borderColor:d.b}}>{NIVEAUS.indexOf(cur)+1}. {cur}</span>
                            </div>
                            <div className="sl-wrap">
                              <input type="range" min={0} max={4} step={1} value={val<0?1:val}
                                style={{background:"linear-gradient(to right,"+d.d+" 0%,"+d.d+" "+(val*25)+"%, var(--border) "+(val*25)+"%, var(--border) 100%)"}}
                                onChange={e=>setNiveau(t.id,'soft-'+s.softskill,NIVEAUS[parseInt(e.target.value)])}/>
                              <div className="sl-labels"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
                            </div>
                          </div>;
                        })}
                      </div>
                    </div>
                  </div>}
                </div>;
              })}
            </div>
          </div>}

          {!loading&&stap===3&&<div className="fi" style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
            <div className="rh">
              <div className="rt">{functietitel} — Definitieve Skillset</div>
              <div className="rm">
                <span><strong>{selHard.length}</strong> hardskills</span>
                <span><strong>{selSoft.length}</strong> softskills</span>
                <span><strong>{selHard.length+selSoft.length}</strong> totaal</span>
              </div>
            </div>
            <div className="steps">
              <button className="step-btn done" onClick={()=>setStap(1)}>◀ Taken</button>
              <button className="step-btn done" onClick={()=>setStap(2)}>◀ Skills aanpassen</button>
              <button className="step-btn active">Stap 3: Definitieve set</button>
            </div>
            <div className="tc">
              <div className="counter-box">
                <div className="counter">Hardskills: <strong>{selHard.length}</strong></div>
                <div className="counter">Softskills: <strong>{selSoft.length}</strong></div>
                <div className="counter" style={{fontWeight:600}}>Totaal: <strong>{selHard.length+selSoft.length}</strong></div>
                {(selHard.length+selSoft.length)>0&&<div style={{display:"flex",gap:8,marginLeft:"auto"}}>
                  <button onClick={exportExcel} style={{padding:"5px 14px",background:"#2d6a4f",color:"white",border:"none",fontFamily:"'Geist Mono',monospace",fontSize:10,letterSpacing:".1em",textTransform:"uppercase",cursor:"pointer",borderRadius:2}}>↓ Export Excel</button>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    <button onClick={exportWord} style={{padding:"5px 14px",background:"#1a56db",color:"white",border:"none",fontFamily:"'Geist Mono',monospace",fontSize:10,letterSpacing:".1em",textTransform:"uppercase",cursor:"pointer",borderRadius:2}}>↓ Export Word</button>
                    <label style={{display:"flex",alignItems:"center",gap:5,fontSize:9,color:"#1a56db",cursor:"pointer"}}>
                      <input type="checkbox" checked={uitgebreid} onChange={e=>setUitgebreid(e.target.checked)} style={{cursor:"pointer"}}/>
                      Uitgebreide functieomschrijving
                    </label>
                  </div>
                </div>}
              </div>
              <div style={{marginBottom:16}}>
                <div className="secl" style={{marginBottom:8}}>Hardskills — selecteer gewenste skills</div>
                {alleHardskills.map(s=>{
                  const k='h-'+s.skill; const sel=!!selectedDef[k]; const d=D[s.niveau]||D["Basis"];
                  return <div key={k} className={"def-row "+(sel?"selected":"")} onClick={()=>setSelectedDef(p=>({...p,[k]:!p[k]}))}>
                    <div className="def-check">{sel&&<span style={{color:"white",fontSize:10}}>✓</span>}</div>
                    <span className="pd" style={{background:s.eigen?"#c084fc":d.d}}/>
                    <div style={{flex:1,fontSize:11}}>
                      {s.skill}
                      {s.eigen&&<span className="eigen-badge">Eigen</span>}
                      {s.esco_code&&<span className="esco-badge" title={s.esco_uri||''}>{s.esco_code}</span>}
                    </div>
                    <span style={{fontSize:9,padding:"2px 7px",borderRadius:2,border:"1px solid",background:d.k,color:d.t,borderColor:d.b,flexShrink:0}}>{NIVEAUS.indexOf(s.niveau)+1}. {s.niveau}</span>
                  </div>;
                })}
              </div>
              <div>
                <div className="secl" style={{marginBottom:8}}>Softskills — selecteer gewenste skills</div>
                {alleSoftskills.map(s=>{
                  const k='s-'+s.softskill; const sel=!!selectedDef[k]; const d=D[s.niveau||"Basis"]||D["Basis"];
                  return <div key={k} className={"def-row "+(sel?"selected":"")} onClick={()=>setSelectedDef(p=>({...p,[k]:!p[k]}))}>
                    <div className="def-check">{sel&&<span style={{color:"white",fontSize:10}}>✓</span>}</div>
                    <span style={{width:5,height:5,borderRadius:"50%",background:"#c4860a",flexShrink:0}}/>
                    <div style={{flex:1,fontSize:11}}>
                      {s.softskill}
                      {s.esco_code&&<span className="esco-badge">{s.esco_code}</span>}
                    </div>
                    <span style={{fontSize:9,padding:"2px 7px",borderRadius:2,border:"1px solid",background:d.k,color:d.t,borderColor:d.b,flexShrink:0}}>{NIVEAUS.indexOf(s.niveau||"Basis")+1}. {s.niveau||"Basis"}</span>
                  </div>;
                })}
              </div>
            </div>
          </div>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
